const SVG_NS = "http://www.w3.org/2000/svg";

function el(tag, attrs) {
  const node = document.createElementNS(SVG_NS, tag);
  if (attrs) {
    for (const key in attrs) node.setAttribute(key, attrs[key]);
  }
  return node;
}

function scaleLinear(domain, range) {
  const d0 = domain[0], d1 = domain[1];
  const r0 = range[0], r1 = range[1];
  return function (x) {
    return r0 + ((x - d0) * (r1 - r0)) / (d1 - d0);
  };
}

function maxOf(arr, fn) {
  return arr.reduce((m, d) => Math.max(m, fn(d)), -Infinity);
}

/* ------------ РАЗМЕРЫ ------------ */

const height = 680;

const yScale = scaleLinear([-0.4, maxFiber * 1.13], [innerHeight, 0]);

function fadeOtherPoints(axis, value) {

/* ================== ОСЬ X ================== */

/* ------------ ЦВЕТ ------------ */
const maxB = maxOf(data, d => d.b);
const maxJ = maxOf(data, d => d.j);
const maxU = maxOf(data, d => d.u);

function getColor(d) {
  const r = 255 * (d.j / maxJ);
  const gr = 255 * (d.u / maxU);
  const b = 255 * (d.b / maxB);
  return `rgb(${r},${gr},${b})`;

/* ------------ РЕНДЕР ТОЧЕК ------------ */

const svgCache = {};

// Пытаемся загрузить иконку продукта. Если она недоступна (нет файла,
// сеть, CORS и т.п.) — просто ничего не возвращаем, и точка остаётся
// цветным кругом без иконки.
// Метка версии — одна на всю загрузку страницы. Добавляем её к ссылке
// на иконку, чтобы CDN/хостинг тоже не мог отдать закэшированный файл
// (одного "no-store" для fetch недостаточно, если кэширует сам сервер).
const CACHE_BUST = Date.now();

async function loadSVG(url) {
  if (svgCache[url] !== undefined) return svgCache[url];
  try {
    const bustedUrl = url + (url.includes("?") ? "&" : "?") + "v=" + CACHE_BUST;
    const res = await fetch(bustedUrl, { cache: "no-store" });
    if (!res.ok) throw new Error("not ok");
    const text = await res.text();
    svgCache[url] = text;
    return text;
  } catch (err) {
    svgCache[url] = null;
    return null;
  }
}

// Перекрашивает все фигуры внутри иконки в один сплошной цвет
// (цвет БЖУ), сохраняя силуэт продукта, но убирая его "родные" цвета.
// Работает и с иконками, где заливка задана через CSS-классы, и с
// "контурными" иконками (fill:none + только обводка) — они тоже
// становятся сплошными, как остальные.
function tintIcon(root, color) {
  // Сначала разбираем встроенные <style>, чтобы найти по-настоящему
  // скрытые элементы (display:none — частый служебный "guide"-элемент
  // при экспорте из Illustrator) и убрать именно их, а не сделать
  // их видимыми, удалив стиль раньше времени.
  const styleTags = root.querySelectorAll("style");
  const hiddenClasses = new Set();

  styleTags.forEach(styleTag => {
    const css = styleTag.textContent || "";
    const ruleRe = /\.([\w-]+)\s*\{([^}]*)\}/g;
    let m;
    while ((m = ruleRe.exec(css))) {
      const className = m[1];
      const body = m[2];
      if (/display\s*:\s*none/i.test(body)) {
        hiddenClasses.add(className);
      }
    }
  });

  if (hiddenClasses.size) {
    root.querySelectorAll("[class]").forEach(node => {
      const classes = (node.getAttribute("class") || "").split(/\s+/);
      if (classes.some(c => hiddenClasses.has(c))) {
        node.remove();
      }
    });
  }

  // Встроенные <style> больше не нужны и могут перебивать наши цвета
  // (например, через классы с fill), поэтому убираем их целиком.
  styleTags.forEach(s => s.remove());

  const nodes = root.querySelectorAll("*");
  const drawable = ["path", "circle", "rect", "ellipse", "polygon", "polyline", "line", "use"];

  [root, ...nodes].forEach(node => {
    const tag = node.tagName ? node.tagName.toLowerCase() : "";
    if (!drawable.includes(tag)) return;

    node.setAttribute("fill", color);
    node.removeAttribute("stroke");
    if (node.style) {
      node.style.setProperty("fill", color, "important");
      node.style.removeProperty("stroke");
    }
  });
}

async function drawPoints(category) {
  category = category || "all";
  pointsLayer.innerHTML = "";
  pointGroups = [];

  const filtered = category === "all" ? data : data.filter(d => d.category === category);

  // Лёгкое смещение для точек с одинаковыми координатами
  const coordMap = new Map();
  filtered.forEach(item => {
    const key = `${item.sugar}-${item.fiber}`;
    if (!coordMap.has(key)) coordMap.set(key, []);
    coordMap.get(key).push(item);
  });

  coordMap.forEach(arr => {
    if (arr.length > 1) {
      const angleStep = (2 * Math.PI) / arr.length;
      const jitter = POINT_RADIUS * 0.55;
      arr.forEach((item, i) => {
        item._jitterX = Math.cos(i * angleStep) * jitter;
        item._jitterY = Math.sin(i * angleStep) * jitter;
      });
    } else {
      arr[0]._jitterX = 0;
      arr[0]._jitterY = 0;
    }
  });

  for (const d of filtered) {
    const radius = POINT_RADIUS;
    const cx = xScale(d.sugar) + (d._jitterX || 0);
    const cy = yScale(d.fiber) + (d._jitterY || 0);

    const group = el("g", {
      class: "point-group",
      transform: `translate(${cx},${cy})`
    });
    pointsLayer.appendChild(group);

    // Прозрачный круг-хитбокс — всегда есть, независимо от того,
    // загрузилась ли картинка. У иконок стоит pointer-events:none,
    // поэтому без этого круга наведение мышью на них не работало бы.
    group.appendChild(el("circle", { r: radius, fill: "transparent" }));

    // Пытаемся показать картинку продукта, перекрашенную в цвет БЖУ.
    // Цветной круг рисуется только если картинку показать не удалось.
    const svgText = svgMap[d.name] ? await loadSVG(svgMap[d.name]) : null;
    let iconOk = false;

    if (svgText) {
      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(svgText, "image/svg+xml");
        const parsedIcon = doc.querySelector("svg");
        if (parsedIcon && !doc.querySelector("parsererror")) {
          const icon = document.importNode(parsedIcon, true);
          const size = radius * 1.8;
          icon.setAttribute("width", size);
          icon.setAttribute("height", size);
          icon.setAttribute("x", -size / 2);
          icon.setAttribute("y", -size / 2);
          icon.setAttribute("preserveAspectRatio", "xMidYMid meet");
          icon.setAttribute("style", "pointer-events:none;");
          tintIcon(icon, getColor(d));
          group.appendChild(icon);

          // Разные SVG-файлы иконок имеют разные внутренние поля вокруг
          // рисунка, из-за чего одни продукты выглядели мельче других.
          // Подгоняем viewBox под реальные границы рисунка, чтобы все
          // иконки визуально занимали одинаковую площадь.
          try {
            const bbox = icon.getBBox();
            if (bbox.width > 0 && bbox.height > 0) {
              const pad = Math.max(bbox.width, bbox.height) * 0.08;
              icon.setAttribute(
                "viewBox",
                `${bbox.x - pad} ${bbox.y - pad} ${bbox.width + pad * 2} ${bbox.height + pad * 2}`
              );
            }
          } catch (bboxErr) {
            // getBBox недоступен в некоторых средах — оставляем исходный viewBox
          }

          iconOk = true;
        }
      } catch (e) {
        iconOk = false;
      }
    }

    // Если картинку продукта не удалось показать — вместо неё рисуем
    // цветной круг (цвет = соотношение БЖУ) с белой обводкой. Если
    // картинка загрузилась, никакого круга под ней нет — просто сама
    // картинка в своих цветах.
    if (!iconOk) {
      const fallbackCircle = el("circle", {
        r: radius,
        fill: getColor(d),
        stroke: "#ffffff",
        "stroke-width": 3
      });
      group.appendChild(fallbackCircle);
    }

    group.addEventListener("mouseenter", (event) => {
      pointsLayer.appendChild(group);

      tooltip.style.opacity = 1;
      tooltip.innerHTML = `<strong>${d.name}</strong><br>
        <span class="muted">Калории:</span> ${d.kcal} ккал<br>
        <span class="muted">Сахар:</span> ${d.sugar} г &nbsp; <span class="muted">Клетчатка:</span> ${d.fiber} г<br>
        <span class="muted">Б:</span> ${d.b} г &nbsp; <span class="muted">Ж:</span> ${d.j} г &nbsp; <span class="muted">У:</span> ${d.u} г`;
      tooltip.style.left = (event.pageX + 14) + "px";
      tooltip.style.top = (event.pageY - 40) + "px";
    });

    group.addEventListener("mousemove", (event) => {
      tooltip.style.left = (event.pageX + 14) + "px";
      tooltip.style.top = (event.pageY - 40) + "px";
    });

    group.addEventListener("mouseleave", () => {
      tooltip.style.opacity = 0;
    });

    pointGroups.push({ node: group, datum: d });
  }
}

/* ------------ ГЛОБАЛЬНАЯ СТРАХОВКА ДЛЯ ТУЛТИПА ------------ */
// Если курсор оказался не над точкой (или ушёл за пределы окна),
// тултип принудительно скрывается — это подстраховка на случай,
// если mouseleave не сработал на самой точке.
document.addEventListener("mousemove", (event) => {
  const overPoint = event.target.closest && event.target.closest(".point-group");
  if (!overPoint) {
    tooltip.style.opacity = 0;
  }
});

document.addEventListener("mouseout", (event) => {
  if (!event.relatedTarget) {
    tooltip.style.opacity = 0;
  }
});

/* ------------ ФИЛЬТРЫ ------------ */
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", async function () {
    const category = this.getAttribute("data-category");
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    await drawPoints(category);
  });
});

/* ------------ СТАРТ ------------ */
drawPoints();

} catch (err) {
  console.error("Nutrition Map error:", err);
  const warn = document.getElementById("jsError");
  if (warn) warn.style.display = "block";
}
</script>
</body>
</html>
